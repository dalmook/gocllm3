sources:
  psi_simul:
    table: mst_psi_simul_report
    description: "PSI 시뮬레이션 리포트"
    period_column: YEARMONTH
    quarter_column: QUARTER
    snapshot_column: WORKDATE
    version_column: VERSION
    latest_snapshot_strategy: "max_snapshot_with_filters"
    default_filters:
      TYPE: "P"
      P_MODULE: "PMIX"
      S_MODULE: "SOKBO"
    columns:
      YEARMONTH:
        description: "기준 년월 YYYYMM"
      QUARTER:
        description: "기준 분기 예: 2026Q1"
      WORKDATE:
        description: "적재 기준일"
      VERSION:
        description: "버전 코드 예: VH, VL"
      FAM1:
        description: "FAM1 분류"
      APP:
        description: "APP 분류"
      SALES_MEQ:
        description: "판매 수량"
      FABOUT_NET_MEQ:
        description: "순생산 수량"
      WHIN_NET_MEQ:
        description: "순입고 수량"
      CUM_TG:
        description: "수율 %"        

metrics:
  sales:
    aliases: ["판매", "판매량", "sales", "매출", "실적"]
    source: psi_simul
    value_column: SALES_MEQ
    unit: "MEQ"
    description: "판매 수량"
  net_prod:
    aliases: ["순생산", "생산", "net production", "net_prod"]
    source: psi_simul
    value_column: FABOUT_NET_MEQ
    unit: "MEQ"
    description: "순생산 수량"
  net_ipgo:
    aliases: ["순입고", "입고", "net ipgo", "net_ipgo"]
    source: psi_simul
    value_column: WHIN_NET_MEQ
    unit: "MEQ"
    description: "순입고 수량"
  CUM_TG:
    aliases: ["수율", "yld", "tg", "cum"]
    source: psi_simul
    value_column: CUM_TG
    unit: "%"
    description: "수율 %"    

dimensions:
  version:
    source: psi_simul
    column: VERSION
    aliases: ["버전", "version", "버전별", "vh", "vl", "wc"]
    supports_filter: true
    supports_groupby: true
    value_mode: "free_text"
    sample_values: ["VH", "VL", "WC"]
    value_aliases:
      vh: "VH"
      vl: "VL"
      wc: "WC"
    description: "버전 축"
  yearmonth:
    source: psi_simul
    column: YEARMONTH
    aliases: ["월", "년월", "month", "월별"]
    supports_filter: true
    supports_groupby: true
    description: "년월 축"
  fam1:
    source: psi_simul
    column: FAM1
    aliases: ["fam1", "패밀리1", "family1", "fam1별"]
    supports_filter: true
    supports_groupby: true
    value_mode: "catalog_or_free_text"
    sample_values: ["DRAM", "NAND", "FLASH"]
    value_aliases:
      dram: "DRAM"
      nand: "FLASH"
      flash: "FLASH"
    description: "FAM1 축"
  app:
    source: psi_simul
    column: APP
    aliases: ["app", "어플", "애플리케이션", "app별"]
    supports_filter: true
    supports_groupby: true
    value_mode: "catalog_or_free_text"
    sample_values: ["MOBILE", "SERVER"]
    value_aliases:
      mobile: "MOBILE"
      서버: "SERVER"
      server: "SERVER"
    description: "APP 축"

query_families:
  total:
    source: psi_simul
    description: "공통 total plan: 단일 기간/기간 범위 합계"
  trend:
    source: psi_simul
    description: "공통 trend plan: 기간 추이"
  compare:
    source: psi_simul
    description: "공통 compare plan: 같은 기간 버전 비교"
  compare_groups:
    source: psi_simul
    description: "공통 compare plan: 기간 그룹 비교"
  grouped:
    source: psi_simul
    description: "공통 grouped plan: 차원 group by"

# Legacy compatibility only:
# 아래 queries는 metadata-driven planner/builder가 처리하지 못한 구문의 fallback 용도로만 유지한다.
queries:
  - id: sales_total_month
    intent: sales_total
    description: "단월 판매량 합계"
    keywords: ["판매", "판매량", "매출", "실적", "월", "몇개", "얼마"]
    patterns:
      - "\\d{1,2}월"
      - "(판매|판매량|매출|실적)"
    supported_slots: ["metric", "aggregation", "period_type", "period_value", "version"]
    default_aggregation: "sum"
    supports_compare: false
    supports_trend: false
    groupable_dimensions: []
    sql: |
      SELECT NVL(SUM(SALES_MEQ), 0) AS sales
      FROM mst_psi_simul_report
      WHERE 1=1
        AND workdate = (
          SELECT MAX(workdate)
          FROM mst_psi_simul_report
          WHERE P_MODULE = 'PMIX'
            AND S_MODULE = 'SOKBO'
            AND YEARMONTH = :anchor_yyyymm
            AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
        )
        AND P_MODULE = 'PMIX'
        AND S_MODULE = 'SOKBO'
        AND YEARMONTH = :anchor_yyyymm
        AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
    params:
      version:
        type: string
        required: false
        aliases: ["버전", "VERSION", "vh", "version", "wc"]
      anchor_yyyymm:
        type: yyyymm
        required: true
        aliases: ["월", "년월", "anchor", "month"]
    result:
      mode: scalar
      field: sales
      empty_message: "해당 조건의 판매 데이터가 없습니다."

  - id: sales_total_period_range
    intent: sales_total
    description: "기간 범위 판매량 합계"
    keywords: ["판매", "판매량", "매출", "실적", "올해", "분기", "누적", "최근"]
    patterns:
      - "(올해|작년|분기|최근\\s*\\d+개월)"
      - "(판매|판매량|매출|실적)"
    supported_slots: ["metric", "aggregation", "period_type", "period_value", "version"]
    default_aggregation: "sum"
    supports_compare: false
    supports_trend: false
    groupable_dimensions: []
    sql: |
      SELECT NVL(SUM(SALES_MEQ), 0) AS sales
      FROM mst_psi_simul_report
      WHERE 1=1
        AND workdate = (
          SELECT MAX(workdate)
          FROM mst_psi_simul_report
          WHERE P_MODULE = 'PMIX'
            AND S_MODULE = 'SOKBO'
            AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
            AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
        )
        AND P_MODULE = 'PMIX'
        AND S_MODULE = 'SOKBO'
        AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
        AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
    params:
      version:
        type: string
        required: false
        aliases: ["버전", "VERSION", "vh", "version", "wc"]
      start_yyyymm:
        type: yyyymm
        required: true
        aliases: ["시작월", "from", "start", "smon"]
      end_yyyymm:
        type: yyyymm
        required: true
        aliases: ["종료월", "to", "end", "emon"]
    result:
      mode: scalar
      field: sales
      empty_message: "해당 조건의 판매 데이터가 없습니다."

  - id: sales_trend_monthly
    intent: sales_trend
    description: "월별 판매 추이"
    keywords: ["추이", "흐름", "트렌드", "월별", "판매", "판매량"]
    patterns:
      - "(추이|흐름|트렌드)"
      - "월별"
    supported_slots: ["metric", "period_type", "period_value", "version", "dimension", "trend"]
    default_aggregation: "sum"
    supports_compare: false
    supports_trend: true
    groupable_dimensions: ["month"]
    sql: |
      SELECT YEARMONTH,
             NVL(SUM(SALES_MEQ), 0) AS sales
      FROM mst_psi_simul_report
      WHERE 1=1
        AND workdate = (
          SELECT MAX(workdate)
          FROM mst_psi_simul_report
          WHERE P_MODULE = 'PMIX'
            AND S_MODULE = 'SOKBO'
            AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
            AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
        )
        AND P_MODULE = 'PMIX'
        AND S_MODULE = 'SOKBO'
        AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
        AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
      GROUP BY YEARMONTH
      ORDER BY YEARMONTH
    params:
      version:
        type: string
        required: false
        aliases: ["버전", "VERSION", "vh", "version", "wc"]
      start_yyyymm:
        type: yyyymm
        required: true
        aliases: ["시작월", "from", "start", "smon"]
      end_yyyymm:
        type: yyyymm
        required: true
        aliases: ["종료월", "to", "end", "emon"]
    result:
      mode: table
      empty_message: "해당 조건의 판매 추이 데이터가 없습니다."

  - id: sales_grouped_by_version
    intent: sales_grouped
    description: "버전별 판매량"
    keywords: ["버전별", "version별", "판매", "판매량", "매출"]
    patterns:
      - "(버전별|version별|버전 별)"
      - "(버전|version).*(판매|판매량|매출|실적)"
    supported_slots: ["metric", "period_type", "period_value", "dimension"]
    default_aggregation: "sum"
    supports_compare: false
    supports_trend: false
    groupable_dimensions: ["version"]
    sql: |
      SELECT VERSION,
             NVL(SUM(SALES_MEQ), 0) AS sales
      FROM mst_psi_simul_report
      WHERE 1=1
        AND workdate = (
          SELECT MAX(workdate)
          FROM mst_psi_simul_report
          WHERE P_MODULE = 'PMIX'
            AND S_MODULE = 'SOKBO'
            AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
        )
        AND P_MODULE = 'PMIX'
        AND S_MODULE = 'SOKBO'
        AND YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm
      GROUP BY VERSION
      ORDER BY sales DESC
    params:
      start_yyyymm:
        type: yyyymm
        required: true
        aliases: ["시작월", "from", "start", "smon"]
      end_yyyymm:
        type: yyyymm
        required: true
        aliases: ["종료월", "to", "end", "emon"]
    result:
      mode: table
      empty_message: "해당 조건의 버전별 판매 데이터가 없습니다."

  - id: sales_compare_periods
    intent: sales_compare
    description: "기간 비교 판매량"
    keywords: ["전월", "전분기", "전년", "대비", "비교", "판매량"]
    patterns:
      - "(전월|전분기|전년)\\s*대비"
      - "비교"
    supported_slots: ["metric", "period_type", "period_value", "version", "compare"]
    default_aggregation: "sum"
    supports_compare: true
    supports_trend: false
    groupable_dimensions: []
    sql: |
      WITH base AS (
        SELECT YEARMONTH, SALES_MEQ
        FROM mst_psi_simul_report
        WHERE 1=1
          AND workdate = (
            SELECT MAX(workdate)
            FROM mst_psi_simul_report
            WHERE P_MODULE = 'PMIX'
              AND S_MODULE = 'SOKBO'
              AND YEARMONTH BETWEEN :compare_start_yyyymm AND :end_yyyymm
              AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
          )
          AND P_MODULE = 'PMIX'
          AND S_MODULE = 'SOKBO'
          AND YEARMONTH BETWEEN :compare_start_yyyymm AND :end_yyyymm
          AND (:version IS NULL OR UPPER(VERSION) = UPPER(:version))
      )
      SELECT NVL(SUM(CASE WHEN YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm THEN SALES_MEQ END), 0) AS current_sales,
             NVL(SUM(CASE WHEN YEARMONTH BETWEEN :compare_start_yyyymm AND :compare_end_yyyymm THEN SALES_MEQ END), 0) AS previous_sales,
             NVL(SUM(CASE WHEN YEARMONTH BETWEEN :start_yyyymm AND :end_yyyymm THEN SALES_MEQ END), 0)
             - NVL(SUM(CASE WHEN YEARMONTH BETWEEN :compare_start_yyyymm AND :compare_end_yyyymm THEN SALES_MEQ END), 0) AS diff_sales
      FROM base
    params:
      version:
        type: string
        required: false
        aliases: ["버전", "VERSION", "vh", "version", "wc"]
      start_yyyymm:
        type: yyyymm
        required: true
        aliases: ["시작월", "from", "start", "smon"]
      end_yyyymm:
        type: yyyymm
        required: true
        aliases: ["종료월", "to", "end", "emon"]
      compare_start_yyyymm:
        type: yyyymm
        required: true
        aliases: ["비교시작월", "compare_from", "prev_start"]
      compare_end_yyyymm:
        type: yyyymm
        required: true
        aliases: ["비교종료월", "compare_to", "prev_end"]
    result:
      mode: table
      empty_message: "해당 조건의 기간 비교 데이터가 없습니다."
